<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PennyHelm</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="favicon-180x180.png">
    <script>(function(){var t=localStorage.getItem('pennyhelm-theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');else if(t==='dark')document.documentElement.setAttribute('data-theme','dark');})()</script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app">
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">PH</h1>
                <span class="logo-text">PennyHelm</span>
            </div>
            <ul class="nav-links">
                <li><a href="#dashboard" class="nav-link active" data-page="dashboard">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="4" width="7.5" height="6.5" rx="2"/><rect x="13" y="4" width="7.5" height="10" rx="2"/><rect x="3.5" y="12.5" width="7.5" height="7.5" rx="2"/><rect x="13" y="16" width="7.5" height="4" rx="2"/></svg>
                    <span>Dashboard</span>
                </a></li>
                <li><a href="#bills" class="nav-link" data-page="bills">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3.5h7l4 4V19a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V5.5a2 2 0 0 1 2-2Z"/><path d="M14 3.5v4h4"/><path d="M8.5 11h7"/><path d="M8.5 14.5h7"/><path d="M8.5 18h5"/></svg>
                    <span>Bills</span>
                </a></li>
                <li><a href="#calendar" class="nav-link" data-page="calendar">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="3"/><path d="M8 3v4"/><path d="M16 3v4"/><path d="M3 10h18"/><rect x="7.5" y="13" width="3" height="3" rx="1"/><rect x="13.5" y="13" width="3" height="3" rx="1"/></svg>
                    <span>Calendar</span>
                </a></li>
                <li><a href="#income" class="nav-link" data-page="income">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18"/><path d="M16 7.5c0-1.8-1.7-3-4-3-2.2 0-3.8 1.1-3.8 2.8 0 1.6 1.2 2.4 3.7 2.9l1.8.4c2.2.4 3.3 1.4 3.3 3 0 2-1.8 3.4-4.3 3.4-2.4 0-4.2-1.1-4.5-3.1"/></svg>
                    <span>Income</span>
                </a></li>
                <li><a href="#debts" class="nav-link" data-page="debts">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13h9"/><path d="M6.8 10.2h9"/><path d="M8.6 7.4h9"/><path d="M15.5 16.2h3.3"/><path d="m17.6 14.4 2.2 1.8-2.2 1.8"/></svg>
                    <span>Debts</span>
                </a></li>
                <li><a href="#accounts" class="nav-link" data-page="accounts">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9.5h16"/><path d="M5.5 9.5 12 5l6.5 4.5"/><path d="M6.5 9.5v7"/><path d="M10 9.5v7"/><path d="M14 9.5v7"/><path d="M17.5 9.5v7"/><path d="M4.5 16.5h15"/><path d="M3.5 19h17"/></svg>
                    <span>Accounts</span>
                </a></li>
                <li><a href="#budgets" class="nav-link" data-page="budgets">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8"/><path d="M12 12V4"/><path d="M12 12h8"/><path d="M12 12 6.3 17.7"/></svg>
                    <span>Budgets</span>
                </a></li>
                <li><a href="#savings" class="nav-link" data-page="savings">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="3"/><circle cx="12" cy="12" r="3.8"/><path d="M12 9.6v4.8"/><path d="M9.6 12h4.8"/><path d="M16.6 7.8v2.4"/><path d="M16.6 13.8v2.4"/></svg>
                    <span>Savings</span>
                </a></li>
                <li><a href="#rules" class="nav-link" data-page="rules">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 7h7"/><path d="M5 12h10"/><path d="M5 17h6"/><circle cx="16.5" cy="7" r="1.7"/><circle cx="18.5" cy="12" r="1.7"/><circle cx="14.5" cy="17" r="1.7"/></svg>
                    <span>Rules</span>
                </a></li>
                <li><a href="#settings" class="nav-link" data-page="settings">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2.8"/><path d="M12 3.5v2.2"/><path d="M12 18.3v2.2"/><path d="m5.9 5.9 1.6 1.6"/><path d="m16.5 16.5 1.6 1.6"/><path d="M3.5 12h2.2"/><path d="M18.3 12h2.2"/><path d="m5.9 18.1 1.6-1.6"/><path d="m16.5 7.5 1.6-1.6"/><path d="M12 7.2a4.8 4.8 0 1 1 0 9.6 4.8 4.8 0 0 1 0-9.6Z"/></svg>
                    <span>Settings</span>
                </a></li>
            </ul>
        </nav>

        <main class="main-content" id="main-content">
            <!-- Pages rendered here by JS -->
        </main>
    </div>

    <!-- Modal overlay for add/edit forms -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h2 id="modal-title">Modal</h2>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <!-- Firebase, Plaid, and QRCode are loaded on demand in cloud mode only (see js/cloud-loader.js) -->
    <script src="https://cdn.jsdelivr.net/npm/d3@7.8.5/dist/d3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-sankey@0.12.3/dist/d3-sankey.min.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
