<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - PennyHelm</title>
    <script>(function(){var t=localStorage.getItem('pennyhelm-theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');else if(t==='dark')document.documentElement.setAttribute('data-theme','dark');})()</script>
    <link rel="stylesheet" href="css/landing.css">
</head>
<body class="login-page">
    <!-- Navigation -->
    <nav class="landing-nav">
        <div class="landing-nav-inner">
            <a href="/" class="landing-logo">
                <div class="logo-mark">PH</div>
                <span class="logo-text">PennyHelm</span>
            </a>
        </div>
    </nav>

    <!-- Login Card -->
    <div class="login-container">
        <div class="login-card">
            <h1>Welcome to PennyHelm</h1>
            <p>Sign in or create an account to get started</p>

            <div id="auth-form">
                <!-- Sign In / Sign Up Tabs -->
                <div class="auth-tabs">
                    <button class="auth-tab active" data-tab="signin">Sign In</button>
                    <button class="auth-tab" data-tab="signup">Sign Up</button>
                </div>

                <form id="email-auth-form">
                    <div class="form-group">
                        <label for="auth-email">Email</label>
                        <input type="email" id="auth-email" class="form-input" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="auth-password">Password</label>
                        <input type="password" id="auth-password" class="form-input" placeholder="Enter your password" required minlength="6">
                    </div>
                    <div class="form-group" id="confirm-password-group" style="display:none;">
                        <label for="auth-confirm-password">Confirm Password</label>
                        <input type="password" id="auth-confirm-password" class="form-input" placeholder="Confirm your password">
                    </div>
                    <div class="form-group" id="referral-code-group" style="display:none;">
                        <label for="auth-referral-code">Referral Code (optional)</label>
                        <input type="text" id="auth-referral-code" class="form-input"
                               placeholder="e.g. REF-A3X9K2M7"
                               style="text-transform:uppercase;font-family:monospace;letter-spacing:1px;">
                        <div style="font-size:11px;color:var(--text-secondary);margin-top:4px;">
                            Were you referred by a friend? Enter their code to give them credit.
                        </div>
                    </div>

                    <div id="auth-error" class="auth-error"></div>

                    <button type="submit" class="btn-auth" id="auth-submit">
                        Sign In
                    </button>
                </form>

                <div class="auth-divider"><span>or</span></div>

                <button class="btn-google" id="google-signin">
                    <svg width="18" height="18" viewBox="0 0 48 48">
                        <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
                        <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
                        <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
                        <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
                    </svg>
                    Continue with Google
                </button>
            </div>

            <p class="auth-footer-text">
                Free 30-day trial. No credit card required.
            </p>
        </div>
    </div>

    <!--
      Firebase SDK — split load for faster signup conversion on mobile.

      Critical path (needed to render the form and honor an existing session):
        • firebase-app-compat  (~32 KB)
        • firebase-auth-compat (~139 KB)
      Deferred until first user action (loaded dynamically from js/login.js):
        • firebase-firestore-compat   (~344 KB — user doc lookup/write)
        • firebase-functions-compat   (~8 KB  — MFA verify callable)
        • firebase-app-check-compat   (~23 KB — attestation for above)

      `defer` lets the HTML parser finish before these execute, removing
      head-of-line blocking on mobile while preserving execution order
      (app before auth before login.js).
    -->
    <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script type="module" src="js/login.js"></script>
</body>
</html>
