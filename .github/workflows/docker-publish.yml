name: Publish Docker image

# Builds a multi-arch (amd64 + arm64) image and pushes it to GitHub Container
# Registry. A runtime smoke test runs first and GATES the publish, so a broken
# container can never be released. Runs on version tags (v*) and can be
# triggered manually from the Actions tab (Run workflow) to publish :latest
# without cutting a release.
#
# NOTE: the first publish creates a PRIVATE package. Make it public once at
# GitHub -> repo -> Packages -> pennyhelm -> Package settings -> Change
# visibility -> Public, so anonymous `docker pull` works for everyone.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  smoke-test:
    name: Build and runtime smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build amd64 image into the local store
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: pennyhelm:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run the container and check /health
        run: |
          docker run -d --name ph -p 8081:8081 pennyhelm:ci
          ok=
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8081/health >/dev/null 2>&1; then
              echo "health endpoint OK after $((i*3))s"; ok=1; break
            fi
            sleep 3
          done
          echo "----- container logs -----"
          docker logs ph 2>&1 | tail -n 30
          docker rm -f ph >/dev/null 2>&1 || true
          if [ "$ok" != "1" ]; then
            echo "::error::container did not become healthy on /health"; exit 1
          fi

  build-and-push:
    name: Publish multi-arch image to GHCR
    needs: smoke-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
